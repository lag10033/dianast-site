<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#C03E18"/>
  <!-- Left pillar cap -->
  <rect x="2" y="5" width="8" height="2.5" rx="0.5" fill="#2a2a2a"/>
  <!-- Left pillar body -->
  <rect x="3" y="7.5" width="6" height="16" rx="0.5" fill="#B83010"/>
  <!-- Left pillar brick lines -->
  <line x1="3" y1="10" x2="9" y2="10" stroke="#8B1F06" stroke-width="0.5"/>
  <line x1="3" y1="12.5" x2="9" y2="12.5" stroke="#8B1F06" stroke-width="0.5"/>
  <line x1="3" y1="15" x2="9" y2="15" stroke="#8B1F06" stroke-width="0.5"/>
  <line x1="3" y1="17.5" x2="9" y2="17.5" stroke="#8B1F06" stroke-width="0.5"/>
  <line x1="3" y1="20" x2="9" y2="20" stroke="#8B1F06" stroke-width="0.5"/>
  <!-- Right pillar cap -->
  <rect x="22" y="5" width="8" height="2.5" rx="0.5" fill="#2a2a2a"/>
  <!-- Right pillar body -->
  <rect x="23" y="7.5" width="6" height="16" rx="0.5" fill="#B83010"/>
  <!-- Right pillar brick lines -->
  <line x1="23" y1="10" x2="29" y2="10" stroke="#8B1F06" stroke-width="0.5"/>
  <line x1="23" y1="12.5" x2="29" y2="12.5" stroke="#8B1F06" stroke-width="0.5"/>
  <line x1="23" y1="15" x2="29" y2="15" stroke="#8B1F06" stroke-width="0.5"/>
  <line x1="23" y1="17.5" x2="29" y2="17.5" stroke="#8B1F06" stroke-width="0.5"/>
  <line x1="23" y1="20" x2="29" y2="20" stroke="#8B1F06" stroke-width="0.5"/>
  <!-- Fence panels (3 horizontal bars) -->
  <rect x="9" y="9" width="14" height="2.5" rx="0.5" fill="#1e1e1e"/>
  <rect x="9" y="13" width="14" height="2.5" rx="0.5" fill="#1e1e1e"/>
  <rect x="9" y="17" width="14" height="2.5" rx="0.5" fill="#1e1e1e"/>
  <!-- Base wall -->
  <rect x="3" y="23.5" width="26" height="3.5" rx="0.5" fill="#922B06"/>
  <line x1="3" y1="25.3" x2="29" y2="25.3" stroke="#6B1A00" stroke-width="0.5"/>
</svg>
